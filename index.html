<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="QQQ/TQQQ three-signal dashboard with live indicators and interactive DCA backtests." />
  <title>QQQ/TQQQ Signal Dashboard</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p id="eyebrow" class="eyebrow">QQQ / TQQQ</p>
        <h1 id="title">纳指三信号仪表盘</h1>
        <p id="subtitle" class="lede">用估值、回撤和恐慌度决定本月买 QQQ、买 TQQQ、暂停，还是减 TQQQ。</p>
      </div>
      <div class="controls compact">
        <button id="zhBtn" class="seg active" type="button">中文</button>
        <button id="enBtn" class="seg" type="button">EN</button>
      </div>
    </header>

    <div id="error" class="error" hidden></div>

    <section id="decisionPanel" class="decision-panel">
      <div>
        <p id="decisionKicker" class="eyebrow">建议操作</p>
        <h2 id="action">加载中</h2>
      </div>
      <div>
        <p id="operation" class="operation">正在拉取市场数据。</p>
        <p id="risk" class="muted"></p>
        <div id="chips" class="chips"></div>
      </div>
    </section>

    <section class="market-grid" aria-live="polite">
      <article class="tile">
        <div class="tile-head">
          <span id="capeLabel">CAPE 分位</span>
          <span class="status-pill"><span id="capeDot" class="dot"></span><span id="capeStatus">--</span></span>
        </div>
        <strong id="capeValue" class="metric">--</strong>
        <p id="capeNote" class="muted">--</p>
        <div class="tile-detail">
          <div id="capeHistoryLabel" class="tile-detail-label">近 12 个月（月频）</div>
          <div id="capeSparkline" class="sparkline"></div>
        </div>
      </article>
      <article class="tile">
        <div class="tile-head">
          <span id="ddLabel">纳指 100 回撤</span>
          <span class="status-pill"><span id="ddDot" class="dot"></span><span id="ddStatus">--</span></span>
        </div>
        <strong id="ddValue" class="metric">--</strong>
        <p id="ddNote" class="muted">--</p>
        <div class="tile-detail">
          <div id="ddHistoryLabel" class="tile-detail-label">近 5 个交易日</div>
          <div id="ddSparkline" class="sparkline"></div>
        </div>
      </article>
      <article class="tile">
        <div class="tile-head">
          <span id="vixLabel">VIX 5 日均值</span>
          <span class="status-pill"><span id="vixDot" class="dot"></span><span id="vixStatus">--</span></span>
        </div>
        <strong id="vixValue" class="metric">--</strong>
        <p id="vixNote" class="muted">--</p>
        <div class="tile-detail">
          <div id="vixHistoryLabel" class="tile-detail-label">近 5 个交易日</div>
          <div id="vixSparkline" class="sparkline"></div>
        </div>
      </article>
    </section>

    <section class="method-panel">
      <div class="section-head">
        <p id="methodKicker" class="eyebrow">计算方法</p>
        <h2 id="methodTitle">三类信号，每日判断、按月入金</h2>
      </div>
      <div id="methods" class="method-grid"></div>
    </section>

    <section class="actions-panel">
      <div class="section-head">
        <p id="actionCatalogKicker" class="eyebrow">动作清单</p>
        <h2 id="actionCatalogTitle">三信号策略会做什么</h2>
        <p id="actionCatalogNote" class="muted"></p>
      </div>
      <div id="actionCatalog" class="action-grid"></div>
    </section>

    <section class="guide-panel">
      <div class="section-head">
        <p id="guideKicker" class="eyebrow">执行框架</p>
        <h2 id="guideTitle">同一组三信号，三种用法</h2>
        <p id="guideNote" class="muted"></p>
      </div>
      <div id="executionGuides" class="guide-grid"></div>
    </section>

    <section class="backtest-panel">
      <div class="section-head split">
        <div>
          <p id="backtestKicker" class="eyebrow">收益回测</p>
          <h2 id="backtestTitle">比较不同定投方式</h2>
        </div>
      </div>

      <div class="backtest-controls">
        <label>
          <span id="startLabel">起始时间</span>
          <select id="startInput">
            <option value="1990-01">1990</option>
            <option value="1995-01">1995</option>
            <option value="2000-01" selected>2000</option>
            <option value="2005-01">2005</option>
            <option value="2010-01">2010</option>
            <option value="2015-01">2015</option>
            <option value="2020-01">2020</option>
            <option value="2025-01">2025</option>
          </select>
        </label>
        <div class="fixed-money">
          <span id="monthlyFixedLabel">每月固定投入</span>
          <strong>$1,000</strong>
        </div>
        <label class="checkline">
          <input id="trendInput" type="checkbox" checked />
          <span id="trendLabel">显示单位净值趋势线</span>
        </label>
        <label class="checkline">
          <input id="scaleInput" type="checkbox" />
          <span id="scaleLabel">对数纵轴</span>
        </label>
        <label class="checkline">
          <input id="qqqAxisInput" type="checkbox" />
          <span id="qqqAxisLabel">右轴显示 QQQ 价格</span>
        </label>
        <label class="checkline">
          <input id="actionsInput" type="checkbox" />
          <span id="actionMarkersLabel">浮窗显示月度动作</span>
        </label>
      </div>

      <div id="strategyToggles" class="strategy-toggles"></div>
      <div class="chart-wrap">
        <canvas id="equityChart" width="1100" height="520" role="img" aria-label="Backtest equity curve"></canvas>
        <div id="tooltip" class="tooltip" hidden></div>
        <div id="chartState" class="chart-state" hidden></div>
      </div>
      <div id="chartReadout" class="chart-readout"></div>
      <div id="workbench" class="workbench"></div>
      <div id="metrics" class="metrics-grid"></div>
      <div id="sensitivity" class="sensitivity"></div>
      <p id="backtestNote" class="small-note"></p>
    </section>

    <section class="sources-panel">
      <p id="meta" class="muted">--</p>
      <p id="sources" class="small-note"></p>
    </section>

    <footer class="footer">
      <span>Open source</span>
      <a id="repoLink" href="https://github.com/kydchen/qqq-tqqq-signal-dashboard" target="_blank" rel="noreferrer">GitHub repo</a>
    </footer>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
